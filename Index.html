<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SP · Rio · Medellín — Jul 10–19</title>
<style>
  :root{
    --bg:#F4F3F8; --card:#FFFFFF; --ink:#1C1C1E; --sub:#8E8E93; --sub2:#AEAEB2;
    --hair:rgba(60,60,67,.10); --blue:#0A84FF; --usd:#1E8E3E;
    --gsp:linear-gradient(135deg,#FF9500 0%,#FF3B77 100%);
    --grio:linear-gradient(135deg,#0A84FF 0%,#30C8D6 100%);
    --gmde:linear-gradient(135deg,#0FAE5F 0%,#8BD41C 100%);
    --grad:linear-gradient(135deg,#5E5CE6 0%,#0A84FF 45%,#30C8D6 80%,#8BD41C 115%);
    --sunset:linear-gradient(135deg,#FF9F0A,#FF5E3A);
    --r:20px; --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding-bottom:calc(84px + env(safe-area-inset-bottom));
  }
  button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}
  a{color:inherit;text-decoration:none}
  svg{display:block}

  /* ---------- Nav ---------- */
  .nav{
    position:sticky;top:0;z-index:50;
    background:rgba(244,243,248,.72);
    -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
    border-bottom:0.5px solid var(--hair);
    padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
  }
  .nav h1{font-size:34px;font-weight:800;letter-spacing:-.022em;line-height:1.05;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;display:inline-block}
  .nav h1.city{background:none;-webkit-text-fill-color:currentColor}
  .crumbrow{display:flex;gap:8px;margin-top:8px;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.01em;
    background:#fff;border:0.5px solid var(--hair);border-radius:99px;padding:5px 11px;color:#3A3A3C;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .chip .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .chip .arr{color:#C7C7CC;font-weight:800;margin:0 1px}
  .chip svg{width:12px;height:12px}

  /* ---------- Tab bar ---------- */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:60;
    display:flex;justify-content:space-around;align-items:flex-start;
    background:rgba(255,255,255,.72);
    -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
    border-top:0.5px solid var(--hair);
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  }
  .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--sub2);transition:color .2s, transform .15s}
  .tabbar button:active{transform:scale(.94)}
  .tabbar svg{width:26px;height:26px}
  .tabbar span{font-size:10.5px;font-weight:600;letter-spacing:-.01em}
  .tabbar button.on{color:var(--blue)}

  /* ---------- Layout ---------- */
  .page{max-width:560px;margin:0 auto;padding:14px 16px 24px;animation:pageIn .32s cubic-bezier(.2,.8,.25,1)}
  @keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-size:13px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin:22px 6px 8px}
  .eyebrow:first-child{margin-top:4px}
  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}

  /* ---------- Hero ---------- */
  .hero{border-radius:24px;background:var(--grad);color:#fff;padding:22px 20px;box-shadow:0 10px 30px rgba(60,90,230,.3);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:-40% -20% auto auto;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.15);filter:blur(2px)}
  .hero .k{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.9}
  .hero h2{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px}
  .hero p{font-size:14px;font-weight:500;opacity:.94}
  .hero .legs{display:flex;gap:8px;margin-top:16px;position:relative;z-index:1}
  .hero .leg{flex:1;background:rgba(255,255,255,.18);border:0.5px solid rgba(255,255,255,.3);border-radius:14px;padding:10px 10px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .hero .leg b{display:block;font-size:15px;font-weight:700}
  .hero .leg span{font-size:11.5px;font-weight:500;opacity:.92}

  /* ---------- Rows ---------- */
  .row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--hair);width:100%;text-align:left;transition:background .15s}
  .card>.row:last-child, .card>div:last-child .row{border-bottom:0}
  .row:active{background:#FAFAFA}
  .glyph{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 0 -2px 6px rgba(0,0,0,.04)}
  .glyph svg{width:21px;height:21px}
  .row .mid{flex:1;min-width:0}
  .row .t{font-size:15.5px;font-weight:600;letter-spacing:-.01em;line-height:1.25}
  .row .s{font-size:13px;color:var(--sub);margin-top:2px;line-height:1.3}
  .row .end{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:2px}
  .time{font-size:11.5px;font-weight:700;color:#55555C;background:#F1F0F6;padding:3px 8px;border-radius:99px;white-space:nowrap}
  .time.sunset{background:var(--sunset);color:#fff}
  .price{font-size:13px;font-weight:600;color:#3A3A3C;white-space:nowrap}
  .usd{font-size:11.5px;font-weight:700;color:var(--usd);white-space:nowrap}
  .chev{width:16px;height:16px;color:#C7C7CC;flex-shrink:0;transition:transform .28s cubic-bezier(.2,.8,.25,1)}
  .open .chev{transform:rotate(180deg)}

  /* ---------- Expansion ---------- */
  .exp{max-height:0;overflow:hidden;transition:max-height .34s cubic-bezier(.2,.8,.25,1)}
  .exp-in{padding:2px 16px 14px 72px}
  .transport{display:flex;align-items:center;gap:8px;background:#F1F0F6;border-radius:12px;padding:9px 12px;font-size:12.5px;font-weight:500;color:#48484A;margin-bottom:8px}
  .transport svg{width:15px;height:15px;flex-shrink:0}
  .note{display:flex;gap:8px;background:#FFF8E6;border:0.5px solid #F5E3AE;border-radius:12px;padding:9px 12px;font-size:12.5px;line-height:1.45;color:#6B5A1E;margin-bottom:8px}
  .note svg{width:15px;height:15px;flex-shrink:0;margin-top:1px}
  .acts{display:flex;gap:8px}
  .acts a{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;padding:9px 0;border-radius:12px;transition:transform .12s}
  .acts a:active{transform:scale(.96)}
  .acts svg{width:15px;height:15px}
  .acts .maps{background:#EAF3FF;color:#0A66D0}
  .acts .uber{background:#111;color:#fff}

  /* ---------- Day pills + banner ---------- */
  .pills{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pill{flex-shrink:0;padding:9px 15px;border-radius:99px;font-size:13.5px;font-weight:700;background:#fff;color:#6C6C70;box-shadow:var(--shadow);transition:all .22s cubic-bezier(.2,.8,.25,1)}
  .pill.on{color:#fff;transform:scale(1.04);box-shadow:0 6px 16px rgba(0,0,0,.16)}
  .banner{border-radius:20px;color:#fff;padding:16px 18px;margin:4px 0 14px;position:relative;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.14)}
  .banner::after{content:"";position:absolute;right:-46px;top:-46px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.16)}
  .banner .d{font-size:23px;font-weight:800;letter-spacing:-.02em;position:relative;z-index:1}
  .banner .theme{font-size:13.5px;font-weight:600;opacity:.95;margin-top:2px;position:relative;z-index:1}
  .banner .chips{display:flex;gap:7px;margin-top:11px;position:relative;z-index:1;flex-wrap:wrap}
  .wx{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.22);border:0.5px solid rgba(255,255,255,.35);padding:5px 11px;border-radius:99px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .wx svg{width:14px;height:14px}
  .wx.umb{background:rgba(20,20,30,.28)}

  /* ---------- Callouts ---------- */
  .callout{display:flex;gap:10px;border-radius:16px;padding:13px 14px;font-size:13px;line-height:1.5;margin:12px 0}
  .callout svg{width:17px;height:17px;flex-shrink:0;margin-top:1px}
  .callout.warn{background:#FFF1EC;color:#8A3B22;border:0.5px solid #F7D4C6}
  .callout.tip{background:#EAF6EE;color:#1E5A34;border:0.5px solid #CBE8D4}
  .callout b{font-weight:700}

  /* ---------- Checklist ---------- */
  .check{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--hair);width:100%;text-align:left}
  .check:last-child{border-bottom:0}
  .box{width:23px;height:23px;border-radius:50%;border:1.5px solid #C7C7CC;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.2,.8,.25,1);color:transparent}
  .check.done .box{background:var(--grad);border-color:transparent;color:#fff}
  .check .txt{font-size:14px;line-height:1.45;transition:all .2s}
  .check.done .txt{color:var(--sub);text-decoration:line-through}
  .box svg{width:13px;height:13px}

  /* ---------- Weather cards ---------- */
  .wxgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .wxcard{border-radius:16px;box-shadow:var(--shadow);padding:13px 12px;color:#fff;position:relative;overflow:hidden}
  .wxcard::after{content:"";position:absolute;right:-24px;bottom:-24px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.18)}
  .wxcard .c{font-size:12px;font-weight:800;letter-spacing:-.01em}
  .wxcard .big{margin:8px 0 6px}
  .wxcard .big svg{width:24px;height:24px}
  .wxcard .rng{font-size:14px;font-weight:800}
  .wxcard .d{font-size:10.5px;opacity:.95;line-height:1.35;margin-top:3px;font-weight:500;position:relative;z-index:1}

  /* ---------- Mini action buttons (hotels/flights) ---------- */
  .mini{display:flex;gap:6px;margin-top:5px}
  .mini a{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:transform .12s}
  .mini a:active{transform:scale(.92)}
  .mini svg{width:14px;height:14px}
  .mini .maps{background:#EAF3FF;color:#0A66D0}
  .mini .uber{background:#111;color:#fff}

  .foot{text-align:center;font-size:12px;color:var(--sub2);margin-top:26px;line-height:1.6}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<script>

/* ============================== ICONS (SF-style stroke set) ============================== */

const ICO = {

  hotel:  svg('<path d="M3 21V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14"/><path d="M1 21h22"/><path d="M8 9h2M14 9h2M8 13h2M14 13h2M10 21v-4h4v4"/>'),
  calendar: svg('<rect x="3" y="4" width="18" height="17" rx="4"/><path d="M3 9h18M8 2.5V6M16 2.5V6"/>','1.9'),
  building: svg('<path d="M4 21V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v15M14 10h4a2 2 0 0 1 2 2v9M2 21h20M8 8h2M8 12h2M8 16h2"/>','1.9'),
  waves:  svg('<path d="M2 16c1.5 1.2 3 1.2 4.5 0s3-1.2 4.5 0 3 1.2 4.5 0 3-1.2 4.5 0M2 20c1.5 1.2 3 1.2 4.5 0s3-1.2 4.5 0 3 1.2 4.5 0 3-1.2 4.5 0M12 3v4M12 3a4 4 0 0 1 4 4H8a4 4 0 0 1 4-4Z"/>','1.9'),

  chevD:  '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',

  car:    svg('<path d="M5 11 6.5 6.5A2 2 0 0 1 8.4 5h7.2a2 2 0 0 1 1.9 1.5L19 11M5 11h14a2 2 0 0 1 2 2v4h-2.5M5 11a2 2 0 0 0-2 2v4h2.5m0 0a2 2 0 1 0 4 0m-4 0h4m6 0a2 2 0 1 0 4 0m-4 0h4"/>','2.2'),
  bulb:   svg('<path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.4 1 2.3h6c0-.9.4-1.8 1-2.3A7 7 0 0 0 12 2Z"/>','2'),

  wpart:  svg('<path d="M12 3v1.5M5.6 5.6l1.1 1.1M3 12h1.5"/><path d="M10 8.5a4 4 0 0 1 3.9 3.1"/><path d="M8 20h9.5a3.5 3.5 0 0 0 .5-7 5 5 0 0 0-9.8 1.4A3 3 0 0 0 8 20Z"/>','2'),
  wcloud: svg('<path d="M7 19h10.5a4 4 0 0 0 .6-8 6 6 0 0 0-11.7 1.6A3.5 3.5 0 0 0 7 19Z"/>','2'),
  wrain:  svg('<path d="M7 15h10.5a4 4 0 0 0 .6-8 6 6 0 0 0-11.7 1.6A3.5 3.5 0 0 0 7 15Z"/><path d="M8 19v2M12 18.5v2.5M16 19v2"/>','2'),

/* ============================== DATA ============================== */
const CAT = {
  food:  ["food","#FFE3C7","#D9480F"], coffee:["coffee","#F3E2CF","#8A5A2B"], sight:["sight","#D6E7FF","#2F6FE4"],
  beach: ["beach","#CFF2EE","#0B9E9E"], hike:  ["hike","#D9F1DA","#2F9E44"], night:["night","#E8DEFE","#6D3FE0"],
  party: ["party","#FCDCF1","#D6338F"], music: ["music","#DEDEFE","#5A5AD1"], flight:["flight","#E4E4EA","#5F5F68"],
  rest:  ["rest","#E4E4EA","#5F5F68"], tour:  ["tour","#FFDBE5","#E64980"], shop: ["shop","#FFEFC2","#C99400"],

};

/* Live forecast config — exact trip dates, pulled from Open-Meteo when the file opens */
const WXCFG = {
  sp:  {lat:-23.55, lon:-46.63, start:"2026-07-11", end:"2026-07-13", fallback:{rng:"59–75°F", note:"Typical July: dry & mild, cool nights.", icon:"wpart"}},
  rio: {lat:-22.97, lon:-43.18, start:"2026-07-13", end:"2026-07-15", fallback:{rng:"66–79°F", note:"Typical July: dry season, Rio's sunniest stretch.", icon:"wsun"}},
  mde: {lat:6.24,  lon:-75.58, start:"2026-07-16", end:"2026-07-18", fallback:{rng:"63–82°F", note:"Typical July: dry month, brief PM shower possible.", icon:"wpart"}}
};
const wxData = {sp:null, rio:null, mde:null}; // per city: {days:{"2026-07-11":{hi,lo,code,rain}}, hi, lo, rain}

function codeIcon(c){
  if(c===0) return "wsun";
  if(c<=2) return "wpart";
  if(c===3||c===45||c===48) return "wcloud";
  if(c>=95) return "wstorm";
  return "wrain";
}
function codeLabel(c){
  if(c===0) return "Sunny";
  if(c<=2) return "Partly cloudy";
  if(c===3) return "Overcast";
  if(c===45||c===48) return "Fog";
  if(c>=95) return "Storms";
  if(c>=80) return "Showers";
  if(c>=61) return "Rain";
  return "Drizzle";
}

async function loadWx(){
  await Promise.all(Object.entries(WXCFG).map(async ([k,c])=>{
    try{
      const u = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=auto&start_date=${c.start}&end_date=${c.end}`;
      const r = await fetch(u); if(!r.ok) throw 0;
      const j = await r.json(); const d = j.daily;
      const days = {};
      d.time.forEach((t,i)=>{ days[t] = {hi:Math.round(d.temperature_2m_max[i]), lo:Math.round(d.temperature_2m_min[i]), code:d.weather_code[i], rain:d.precipitation_probability_max[i] ?? 0}; });
      const his = Object.values(days);
      wxData[k] = {days, hi:Math.max(...his.map(x=>x.hi)), lo:Math.min(...his.map(x=>x.lo)), rain:Math.max(...his.map(x=>x.rain)), code:his.sort((a,b)=>b.rain-a.rain)[0].code};
    }catch(e){ wxData[k] = null; }
  }));
  render();
}

function rowHTML(it, id){
  const [ic,bgc,fgc] = CAT[it.cat] || CAT.sight;
  const hasExp = it.tr || it.note || it.q;
  return `
  <div id="w${id}">
    <button class="row" onclick="toggleRow('${id}')" ${hasExp?'':'style="cursor:default"'}>
      <div class="glyph" style="background:${bgc};color:${fgc}">${ICO[ic]}</div>
      <div class="mid">
        <div class="t">${esc(it.t)}</div>
        <div class="s">${esc(it.s)}</div>
      </div>
      <div class="end">
        <span class="time ${it.sunset?'sunset':''}">${esc(it.time)}</span>
        <span class="price">${esc(it.p)}</span>
        ${it.u?`<span class="usd">${esc(it.u)}</span>`:''}
      </div>
      ${hasExp? ICO.chevD : ''}
    </button>
    ${hasExp?`<div class="exp" id="e${id}"><div class="exp-in">
        ${it.note?`<div class="note">${ICO.bulb}<span>${esc(it.note)}</span></div>`:''}
        ${it.tr?`<div class="transport">${ICO.car}<span>${esc(it.tr)}</span></div>`:''}
        ${it.q?`<div class="acts">
          <a class="maps" href="${gm(it.q)}" target="_blank" rel="noopener">${ICO.pin} Maps</a>
          <a class="uber" href="${ub(it.q)}" target="_blank" rel="noopener">${ICO.car} Uber here</a>
        </div>`:''}
    </div></div>`:''}
  </div>`;
}

function toggleRow(id){
  const w = document.getElementById("w"+id), e = document.getElementById("e"+id);
  if(!e) return;
  const open = w.classList.toggle("open");
  e.style.maxHeight = open ? e.scrollHeight + "px" : "0px";
}

  if(live){
    let chips = `<span class="wx">${ICO[codeIcon(live.code)]} ${codeLabel(live.code)} · ${live.lo}–${live.hi}°F</span>`;
    if(live.rain >= 40) chips += `<span class="wx umb">${ICO.umbrella} ${live.rain}% rain — pack an umbrella</span>`;
    else if(live.rain >= 20) chips += `<span class="wx">${ICO.wrain} ${live.rain}% rain chance</span>`;
    return chips;
  }
  const f = WXCFG[d.wx].fallback;
  return `<span class="wx">${ICO[f.icon]} ${f.rng} typical</span>`;
}

function cityHTML(key){
  const c = CITIES[key], di = dayIdx[key], d = c.days[di];
  const pills = c.days.map((dd,i)=>
    `<button class="pill ${i===di?'on':''}" style="${i===di?`background:${c.grad}`:''}" onclick="setDay('${key}',${i})">${dd.label}</button>`).join("");
  const warn = (key==='rio' && di===1)
    ? `<div class="callout warn">${ICO.alert}<span><b>Tight night.</b> Beach day → early dinner → wheels to GIG by 10:15 PM for a 1:35 AM flight. Don't let Arpoador sunset drinks turn into a second dinner.</span></div>` : "";
  const coffee = (key==='mde' && di===0)
    ? `<div class="callout tip">${ICO.coffee}<span><b>Poblado coffee shortlist</b> — all a short walk or ~$2.50 Uber from the York: Pergamino (Cra 37), Hija Mía (Cra 35), Café Velvet, Urbania Café. Slot one into any morning.</span></div>` : "";
  return `<div class="page">
    <div class="pills">${pills}</div>
    <div class="banner" style="background:${c.grad}">
      <div class="d">${d.date}</div>
      <div class="theme">${d.theme}</div>
      <div class="chips">${dayWxChips(d)}</div>
    </div>
    ${warn}
    <div class="card">${d.items.map((it,i)=>rowHTML(it, key+di+"_"+i)).join("")}</div>
    ${coffee}
  </div>`;
}

function checklistHTML(list, group){
  return `<div class="card">${list.map((t,i)=>`
    <button class="check ${checks[group].has(i)?'done':''}" onclick="toggleCheck('${group}',${i},this)">
      <span class="box">${ICO.check}</span><span class="txt">${esc(t)}</span>
    </button>`).join("")}</div>`;
}

function toggleCheck(group,i,el){
  checks[group].has(i) ? checks[group].delete(i) : checks[group].add(i);
  el.classList.toggle("done");
}

function overviewHTML(){
  const wxGrads = {sp:"var(--gsp)", rio:"var(--grio)", mde:"var(--gmde)"};
  const anyUmb = Object.keys(WXCFG).filter(k=>wxData[k] && wxData[k].rain>=40).map(k=>CITIES[k].name);
  const live = Object.values(wxData).some(Boolean);
  return `<div class="page">
    <div class="hero">
      <div class="k">9 days · 3 cities · 3 travelers</div>
      <h2>South America, done right.</h2>
      <p>Sunrise landmarks, beach-club afternoons, and out most nights.</p>
      <div class="legs">
        <div class="leg"><b>São Paulo</b><span>Jul 11–13</span></div>
        <div class="leg"><b>Rio</b><span>Jul 13–16</span></div>
        <div class="leg"><b>Medellín</b><span>Jul 16–18</span></div>
      </div>
    </div>

    <div class="eyebrow">${live ? "Forecast for your dates · live" : "July weather · typical (forecast loads online)"}</div>
    <div class="wxgrid">
      ${Object.entries(WXCFG).map(([k,c])=>{
        const w = wxData[k];
        if(w) return `<div class="wxcard" style="background:${wxGrads[k]}">
          <div class="c">${CITIES[k].name}</div>
          <div class="big">${ICO[codeIcon(w.code)]}</div>
          <div class="rng">${w.lo}–${w.hi}°F</div>
          <div class="d">${codeLabel(w.code)} · up to ${w.rain}% rain chance</div>
        </div>`;
        return `<div class="wxcard" style="background:${wxGrads[k]}">
          <div class="c">${CITIES[k].name}</div>
          <div class="big">${ICO[c.fallback.icon]}</div>
          <div class="rng">${c.fallback.rng}</div>
          <div class="d">${c.fallback.note}</div>
        </div>`;
      }).join("")}
    </div>
    ${live
      ? (anyUmb.length
          ? `<div class="callout warn">${ICO.umbrella}<span><b>Umbrella alert:</b> real rain chances on your dates in ${anyUmb.join(" and ")} — check the day banners in ${anyUmb.length>1?"those tabs":"that tab"} for exactly which day, and pack a compact umbrella.</span></div>`
          : `<div class="callout tip">${ICO.check}<span><b>No umbrella needed as of now:</b> every day of the trip shows under 40% rain chance. Chances can shift — this refreshes with the live forecast each time you open the file.</span></div>`)
      : `<div class="callout tip">${ICO.wrain}<span><b>Forecast note:</b> open this file with internet and the cards above switch from typical July averages to the actual forecast for your exact dates, including per-day umbrella alerts on each city's day banner.</span></div>`}

    <div class="eyebrow">Flights</div>
    <div class="card">${FLIGHTS.map(f=>`
      <div class="row" style="cursor:default">
        <div class="glyph" style="background:#E4E4EA;color:#5F5F68">${ICO.flight}</div>
        <div class="mid"><div class="t">${esc(f.route)}</div><div class="s">${esc(f.detail)}</div></div>
        <div class="end">
          <span class="time">${esc(f.date)}</span>
          <div class="mini">
            <a class="maps" href="${gm(f.q)}" target="_blank" rel="noopener" aria-label="Open ${f.ql} in Maps">${ICO.pin}</a>
            <a class="uber" href="${ub(f.q)}" target="_blank" rel="noopener" aria-label="Uber to ${f.ql}">${ICO.car}</a>
          </div>
        </div>
      </div>`).join("")}</div>
    <div class="callout tip">${ICO.car}<span><b>Tap the black car on any flight</b> to open Uber pre-loaded with that departure airport — one tap when it's time to head out.</span></div>

    <div class="eyebrow">Hotels</div>
    <div class="card">${HOTELS.map(h=>`
      <div class="row" style="cursor:default">
        <div class="glyph" style="background:#E4E4EA;color:#5F5F68">${ICO.hotel}</div>
        <div class="mid"><div class="t">${esc(h.name)}</div><div class="s">${esc(h.addr)} · ${esc(h.city)}</div></div>
        <div class="end">
          <span class="time">${esc(h.dates)}</span>
          <div class="mini">
            <a class="maps" href="${gm(h.q)}" target="_blank" rel="noopener" aria-label="Open ${esc(h.name)} in Maps">${ICO.pin}</a>
            <a class="uber" href="${ub(h.q)}" target="_blank" rel="noopener" aria-label="Uber to ${esc(h.name)}">${ICO.car}</a>
          </div>
        </div>
      </div>`).join("")}</div>

    <div class="eyebrow">Book before you go</div>
    ${checklistHTML(BOOKINGS,"book")}

    <div class="eyebrow">Packing</div>
    ${checklistHTML(PACKING,"pack")}

    <div class="foot">USD conversions are approximate: R$5.50 ≈ $1 · COP 4,100 ≈ $1.<br>Forecast: Open-Meteo, refreshes each open · Checklist ticks reset when the file is reopened.</div>
  </div>`;
}

/* ============================== SHELL ============================== */
const TABS = [
  {key:"overview", label:"Overview", icon:ICO.calendar},
  {key:"sp",  label:"São Paulo", icon:ICO.building},
  {key:"rio", label:"Rio", icon:ICO.waves},
  {key:"mde", label:"Medellín", icon:ICO.mountain}
];

function crumbHTML(){
  if(tab==="overview") return `
    <span class="chip">${ICO.calendar} Jul 10–19</span>
    <span class="chip"><i class="dot" style="background:var(--gsp)"></i>SP<span class="arr">›</span><i class="dot" style="background:var(--grio)"></i>Rio<span class="arr">›</span><i class="dot" style="background:var(--gmde)"></i>MDE</span>
    <span class="chip">3 travelers</span>`;
  const c = CITIES[tab];
  const dates = {sp:"Jul 11–13", rio:"Jul 13–16", mde:"Jul 16–18"}[tab];
  const hotel = {sp:"Meliá Paulista", rio:"Othon Palace", mde:"The York"}[tab];
  return `
    <span class="chip"><i class="dot" style="background:${c.grad}"></i>${dates}</span>
    <span class="chip">${ICO.hotel} ${hotel}</span>
    <span class="chip">${c.days.length} days</span>`;
}

function render(){
  const title = document.getElementById("navTitle");
  title.textContent = tab==="overview" ? "Trip" : CITIES[tab].name;
  title.className = tab==="overview" ? "" : "city";
  title.style.color = tab==="overview" ? "" : CITIES[tab].accent;
  document.getElementById("crumb").innerHTML = crumbHTML();
  document.getElementById("root").innerHTML = tab==="overview" ? overviewHTML() : cityHTML(tab);
  document.getElementById("tabbar").innerHTML = TABS.map(t=>`
    <button class="${t.key===tab?'on':''}" onclick="setTab('${t.key}')" ${t.key===tab && CITIES[t.key]?`style="color:${CITIES[t.key].accent}"`:''}>
      ${t.icon}<span>${t.label}</span>
    </button>`).join("");
  window.scrollTo({top:0});
}
function setTab(k){ tab=k; render(); }
function setDay(k,i){ dayIdx[k]=i; render(); }
render();
loadWx();
</script>
</body>
</html>
